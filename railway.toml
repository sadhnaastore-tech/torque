# railway.toml — Railway deployment configuration for the FastAPI backend
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 30     # seconds to wait before marking unhealthy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
